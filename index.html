<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Student Task Tracker</h1>
            <p class="subtitle">Keep track of your assignments and tasks</p>
        </header>

        <main>
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
            </div>

            <!-- Tasks List Section -->
            <div class="tasks-section">
                <div class="tasks-header">
                    <h2>My Tasks</h2>
                    <span id="taskCount" class="task-count">0</span>
                </div>
                <ul id="taskList" class="task-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>No tasks yet. Add one to get started! ✨</p>
                </div>
            </div>

            <!-- Clear All Section -->
            <div class="actions-section">
                <button id="clearBtn" class="clear-btn">Clear Completed Tasks</button>
            </div>
        </main>

        <footer>
            <p>Stay organized and productive! 🎯</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
